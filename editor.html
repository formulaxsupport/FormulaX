<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>FormulaX - Aufgaben-Studio</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .question-card { background: #fff; border: 1px solid #e2e8f0; padding: 20px; border-radius: 8px; margin-bottom: 20px; position: relative; }
        .image-preview { max-width: 180px; max-height: 130px; margin-top: 10px; border-radius: 6px; display: block; border: 1px dashed #cbd5e1; background: #f8fafc; object-fit: contain; }
        .mc-option-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .mc-option-row input[type="radio"] { width: 20px; height: 20px; cursor: pointer; accent-color: #10b981; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-left"><img src="bilder/logo.jpg" alt="Logo" class="logo-img"><span class="role-badge" id="user-role-display">...</span></div>
        <div class="nav-right"><a href="index.html">Home</a><a href="editor.html" class="active">Editor</a><a href="classroom.html">Classroom</a><a href="gallerie.html">Galerie</a><button class="logout-btn" id="logout-btn">Logout</button></div>
    </nav>

    <main class="container">
        <h1>🛠️ Aufgaben- & Quiz-Studio</h1>

        <div class="card" style="margin-bottom: 20px; background:#f1f5f9;">
            <label style="font-weight:bold; display:block; margin-bottom:5px;">📂 Vorhandenes Quiz bearbeiten oder neu starten:</label>
            <select id="quiz-selector" class="search-input" style="margin:0;" onchange="onQuizSelectionChange(this.value)">
                <option value="NEW">✨ Neues leeres Quiz erstellen</option>
            </select>
        </div>

        <div class="card" style="margin-bottom: 25px;">
            <h2>⚙️ Allgemeine Quiz-Konfiguration</h2>
            <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 15px;">
                <input type="text" id="quiz-title" class="search-input" style="margin:0;" placeholder="Titel der Challenge...">
                <select id="quiz-visibility" class="search-input" style="margin:0;">
                    <option value="oeffentlich">🌐 Öffentlich</option>
                    <option value="privat">🔒 Privat</option>
                </select>
            </div>
        </div>

        <div id="questions-list-container"></div>

        <div style="display: flex; gap: 10px; margin-top: 20px; margin-bottom: 40px; flex-wrap: wrap;">
            <button class="btn" style="background:#475569;" onclick="addQuestionData('multiple')">➕ Multiple Choice</button>
            <button class="btn" style="background:#0284c7;" onclick="addQuestionData('freetext')">✏️ Texteingabe</button>
            <button class="btn" style="background:#14b8a6;" onclick="addQuestionData('video')">🎬 Video-Analyse</button>
            <button class="btn" style="background:#6366f1;" onclick="addQuestionData('info')">ℹ️ Infokarte / Text</button>
            <button class="btn" style="background:#10b981; margin-left: auto;" onclick="saveCompleteQuizToServer()">💾 Quiz speichern (Cloud)</button>
        </div>
    </main>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbySow-kXXtEjavDSwOQE5I1kXbx1OoutxaaDU3IxT6Lz0AkDzthlRQvBe72z-2_A1Tt/exec";
        let currentUser = {};
        let allQuizzesFetched = [];
        let currentEditingQuizId = null;
        let questionsArray = [];

        document.addEventListener("DOMContentLoaded", () => {
            currentUser = JSON.parse(sessionStorage.getItem("currentUser") || "{}");
            if(!currentUser.username || currentUser.role === "schueler") { window.location.href = "index.html"; return; }
            document.getElementById("user-role-display").innerText = currentUser.role;

            fetchQuizListForSelector();
            resetToNewQuiz();
        });

        async function fetchQuizListForSelector() {
            const res = await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "loadQuizzes", username: currentUser.username }) });
            const data = await res.json();
            if(data.success) {
                allQuizzesFetched = data.quizzes;
                const selector = document.getElementById("quiz-selector");
                while(selector.options.length > 1) { selector.remove(1); }
                
                data.quizzes.forEach(q => {
                    if(q.creator === currentUser.username) {
                        let opt = document.createElement("option");
                        opt.value = q.id;
                        opt.innerText = `📝 ${q.title} [${q.visibility}]`;
                        selector.appendChild(opt);
                    }
                });
            }
        }

        function onQuizSelectionChange(val) {
            if(val === "NEW") {
                resetToNewQuiz();
            } else {
                const target = allQuizzesFetched.find(q => q.id === val);
                if(target) {
                    currentEditingQuizId = target.id;
                    document.getElementById("quiz-title").value = target.title;
                    document.getElementById("quiz-visibility").value = target.visibility;
                    questionsArray = typeof target.questions === 'string' ? JSON.parse(target.questions) : target.questions;
                    renderQuestions();
                }
            }
        }

        function resetToNewQuiz() {
            currentEditingQuizId = null;
            document.getElementById("quiz-title").value = "";
            document.getElementById("quiz-visibility").value = "oeffentlich";
            questionsArray = [];
            addQuestionData('multiple');
        }

        function addQuestionData(type) {
            const id = "Q-NUM-" + Date.now() + Math.floor(Math.random()*100);
            questionsArray.push({ 
                id: id, 
                type: type, 
                questionText: "", 
                imageBase64: "", 
                options: ["", "", "", ""], 
                correctAnswerIndex: 0, 
                correctTextAnswer: "", 
                videoUrl: "",
                explanation: "" 
            });
            renderQuestions();
        }

        function removeQuestion(index) {
            if(questionsArray.length <= 1) return alert("Mindestens eine Aufgabe erforderlich!");
            questionsArray.splice(index, 1);
            renderQuestions();
        }

        function handleImageUpload(event, index) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                questionsArray[index].imageBase64 = e.target.result;
                document.getElementById(`preview-${index}`).src = e.target.result;
                document.getElementById(`preview-${index}`).style.display = "block";
            };
            reader.readAsDataURL(file);
        }

        function setCorrectRadio(qIndex, optIndex) { questionsArray[qIndex].correctAnswerIndex = optIndex; }

        function renderQuestions() {
            const container = document.getElementById("questions-list-container");
            container.innerHTML = "";
            questionsArray.forEach((q, index) => {
                let card = document.createElement("div");
                card.className = "question-card";
                let deleteBtn = `<button style="position:absolute; top:15px; right:15px; background:#ef4444; color:white; border:none; padding:4px 8px; border-radius:4px; cursor:pointer;" onclick="removeQuestion(${index})">Löschen</button>`;
                
                let displayType = q.type === 'info' ? 'ℹ️ Infokarte / Erklärungstext' : q.type;
                let placeholderText = q.type === 'info' ? 'Erklärungstext oder mathematische Theorie hier eintragen...' : 'Fragestellung eintippen...';

                let commonHeader = `<div style="margin-bottom:12px;"><strong>Aufgabe #${index + 1} &mdash; ${displayType}</strong></div>
                    <textarea class="search-input" style="height: 60px; font-family:inherit; padding:10px;" placeholder="${placeholderText}" id="input-text-${index}">${q.questionText || ''}</textarea>`;

                let imageUploadSegment = q.type !== 'video' ? `<div style="margin: 15px 0; padding: 10px; background: #f8fafc; border-radius: 6px;"><input type="file" accept="image/*" onchange="handleImageUpload(event, ${index})"><img id="preview-${index}" class="image-preview" src="${q.imageBase64 || ''}" style="${q.imageBase64 ? 'display:block;' : 'display:none;'}"></div>` : "";
                let specificBody = "";

                if (q.type === 'multiple') {
                    specificBody = `<div style="margin-top:10px;">`;
                    for(let o = 0; o < 4; o++) {
                        specificBody += `<div class="mc-option-row">
                            <input type="radio" name="correct-ans-${index}" ${Number(q.correctAnswerIndex) === o ? 'checked' : ''} onclick="setCorrectRadio(${index}, ${o})">
                            <input type="text" class="search-input" style="margin:0;" value="${q.options[o] || ''}" oninput="questionsArray[${index}].options[${o}]=this.value" placeholder="Option ${String.fromCharCode(65+o)}">
                        </div>`;
                    }
                    specificBody += `</div>`;
                } else if (q.type === 'freetext') {
                    specificBody = `<div style="margin-top:10px;"><input type="text" class="search-input" value="${q.correctTextAnswer || ''}" oninput="questionsArray[${index}].correctTextAnswer=this.value" placeholder="Lösungstext..."></div>`;
                } else if (q.type === 'video') {
                    specificBody = `<div style="margin-top:10px;"><input type="text" class="search-input" value="${q.videoUrl || ''}" oninput="questionsArray[${index}].videoUrl=this.value" placeholder="YouTube URL..."></div>`;
                }

                // Bei Infokarten brauchen wir kein extra Feedbackfeld, da die Karte selbst die Erklärung ist
                let explanationSegment = "";
                if(q.type !== 'info') {
                    explanationSegment = `<div style="margin-top:15px; border-top: 1px dashed #cbd5e1; padding-top: 10px;">
                        <label style="font-size:0.85rem; font-weight:600; color:#475569; display:block; margin-bottom:4px;">💡 Erklärung / Infotext (wird dem Schüler nach der Antwort angezeigt):</label>
                        <input type="text" class="search-input" style="margin:0; background:#fcfffa; border-color:#bbf7d0;" value="${q.explanation || ''}" oninput="questionsArray[${index}].explanation=this.value" placeholder="Erklärung, Rechenweg oder zusätzliche Infos...">
                    </div>`;
                }

                card.innerHTML = deleteBtn + commonHeader + imageUploadSegment + specificBody + explanationSegment;
                container.appendChild(card);

                document.getElementById(`input-text-${index}`).addEventListener('input', (e) => { questionsArray[index].questionText = e.target.value; });
            });
        }

        async function saveCompleteQuizToServer() {
            const title = document.getElementById("quiz-title").value.trim();
            const visibility = document.getElementById("quiz-visibility").value;
            if(!title) return alert("Titel fehlt!");

            const payload = {
                action: "saveQuiz",
                quizId: currentEditingQuizId,
                title: title,
                creator: currentUser.username,
                visibility: visibility,
                questions: questionsArray
            };

            const res = await fetch(API_URL, { method: "POST", body: JSON.stringify(payload) });
            const data = await res.json();
            if(data.success) {
                alert("Erfolgreich in der Cloud gespeichert!");
                fetchQuizListForSelector();
            }
        }
        document.getElementById("logout-btn").addEventListener("click", () => { sessionStorage.clear(); window.location.href="login.html"; });
    </script>
</body>
</html>
