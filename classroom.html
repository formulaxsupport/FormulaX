<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>FormulaX - Classroom Management</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-left">
            <img src="bilder/logo.jpg" alt="FormulaX Logo" class="logo-img">
            <span class="role-badge" id="user-role-display">...</span>
        </div>
        <div class="nav-right">
            <a href="index.html">Home</a>
            <a href="editor.html">Editor</a>
            <a href="classroom.html" class="active">Classroom</a>
            <a href="gallerie.html">Galerie</a>
            <button class="logout-btn" id="logout-btn">Logout</button>
        </div>
    </nav>

    <main class="container">
        <h1>🏫 Classroom-Zentrale</h1>
        <p style="color: #64748b; margin-bottom: 25px;">Verwalte deine Lerngruppen, pinne Aufgaben fest oder bearbeite Kursnamen.</p>

        <div class="card" id="teacher-creation-zone" style="display:none; background:#f8fafc;">
            <h2>➕ Neue Klasse gründen</h2>
            <div style="display:flex; gap:10px;">
                <input type="text" id="new-class-name" class="search-input" style="margin:0;" placeholder="z.B. Klasse 7B, Mathe-AG">
                <button class="btn" style="background:#10b981;" onclick="createClass()">Klasse eröffnen</button>
            </div>
        </div>

        <div class="dashboard-grid">
            <div class="main-content">
                <div class="card">
                    <h2>📋 Verfügbare Klassen im Schulnetzwerk</h2>
                    <div id="classes-list-container">Lade Klassenverbände...</div>
                </div>
            </div>

            <div class="sidebar">
                <div class="card" id="class-detail-card" style="display:none; background:#0f172a; color:#fff;">
                    <div style="display:flex; justify-content:space-between; align-items:start; border-bottom:1px solid #334155; padding-bottom:10px; margin-bottom:15px;">
                        <div>
                            <h2 id="detail-class-name" style="color:#fff; margin:0; border:none; padding:0;">Klassendetails</h2>
                            <span id="detail-class-owner" style="font-size:0.8rem; color:#94a3b8;">Lehrer: -</span>
                        </div>
                        <button class="btn btn-sm" style="background:#475569;" onclick="closeDetails()">X</button>
                    </div>

                    <div style="background:#1e293b; padding:15px; border-radius:8px; margin-bottom:20px; border:1px solid #334155;">
                        <h3 style="font-size:1rem; color:#3b82f6; margin-bottom:10px;">📌 Angepinnte Lerninhalte</h3>
                        <div id="pinned-content-list" style="font-size:0.9rem; margin-bottom:10px; display:flex; flex-direction:column; gap:8px;"></div>
                        
                        <div id="teacher-pin-form" style="display:none; margin-top:10px; border-top:1px solid #334155; padding-top:10px;">
                            <input type="text" id="new-pin-text" class="search-input" style="background:#0f172a; color:#fff; border-color:#334155; font-size:0.85rem; padding:8px;" placeholder="Wichtige Nachricht oder Link pinnen...">
                            <button class="btn btn-sm" style="width:100%;" onclick="addPinToCurrentClass()">Inhalt anpinnen</button>
                        </div>
                    </div>

                    <div id="teacher-student-management" style="display:none;">
                        <h3 style="font-size:1rem; margin-bottom:10px; color:#cbd5e1;">👥 Schüler verwalten</h3>
                        <div style="display:flex; gap:5px; margin-bottom:15px;">
                            <input type="text" id="student-search-input" list="students-datalist" class="search-input" style="background:#1e293b; color:#fff; border-color:#334155; margin:0; padding:8px;" placeholder="Schüler suchen (z.B. Mo...)">
                            <datalist id="students-datalist"></datalist>
                            
                            <button class="btn btn-sm" style="background:#10b981;" onclick="addStudentToClass()">Hinzufügen</button>
                        </div>
                        <div id="class-members-list" style="display:flex; flex-direction:column; gap:8px;"></div>
                    </div>

                    <div id="student-status-view" style="display:none; text-align:center; padding:10px; background:#1e293b; border-radius:6px;">
                        <p id="student-membership-text" style="font-size:0.9rem; color:#94a3b8;"></p>
                        <button id="join-leave-class-btn" class="btn btn-sm" style="margin-top:10px; width:100%;"></button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbySow-kXXtEjavDSwOQE5I1kXbx1OoutxaaDU3IxT6Lz0AkDzthlRQvBe72z-2_A1Tt/exec";
        let currentUser = {};
        let allAvailableClasses = [];
        let selectedClassObj = null;

        document.addEventListener("DOMContentLoaded", () => {
            currentUser = JSON.parse(sessionStorage.getItem("currentUser") || "{}");
            if(!currentUser.username) { window.location.href="login.html"; return; }

            document.getElementById("user-role-display").innerText = currentUser.role;

            if(currentUser.role === "lehrer" || currentUser.role === "admin") {
                document.getElementById("teacher-creation-zone").style.display = "block";
                // Schülerliste für die Live-Suche laden, falls Lehrer eingeloggt ist
                fetchAllStudentsForSearch();
            }

            loadClassesFromServer();
        });

        // HIER WIRD DIE LIVE-SUCHE GEFÜTTERT
        async function fetchAllStudentsForSearch() {
            try {
                const res = await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "searchAllStudents" }) });
                const data = await res.json();
                if(data.success) {
                    const datalist = document.getElementById("students-datalist");
                    datalist.innerHTML = "";
                    data.students.forEach(student => {
                        let option = document.createElement("option");
                        option.value = student.username; // Der exakte Spitzname (z.B. M0r1tz_15)
                        datalist.appendChild(option);
                    });
                }
            } catch(err) { console.error("Fehler beim Laden der Schülersuche: ", err); }
        }

        async function loadClassesFromServer() {
            const container = document.getElementById("classes-list-container");
            container.innerHTML = "Lade Klassenstruktur aus der Cloud...";
            
            const res = await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "loadClasses" }) });
            const data = await res.json();
            
            if(data.success) {
                allAvailableClasses = data.classes;
                container.innerHTML = "";
                
                if(allAvailableClasses.length === 0) {
                    container.innerHTML = "<p style='color:#64748b; font-style:italic;'>Aktuell sind keine Klassen registriert.</p>";
                    return;
                }

                allAvailableClasses.forEach((c, idx) => {
                    let div = document.createElement("div");
                    div.className = "project-item";
                    
                    let isOwner = (c.creator === currentUser.username || currentUser.role === "admin");
                    
                    let managementButtons = isOwner ? `
                        <div style="display:flex; gap:6px;">
                            <button class="btn btn-sm" style="background:#3b82f6; margin:0;" onclick="openClassDetails(${idx})">⚙️ Verwalten</button>
                            <button class="btn btn-sm" style="background:#f59e0b; margin:0;" onclick="renameClassPrompt('${c.className}')">✏️ Name ändern</button>
                            <button class="btn-danger-sm" onclick="deleteClassFromServer('${c.className}')">Löschen</button>
                        </div>
                    ` : `
                        <button class="btn btn-sm" style="background:#64748b; margin:0;" onclick="openClassDetails(${idx})">👁️ Board ansehen</button>
                    `;

                    div.innerHTML = `
                        <div>
                            <strong style="font-size:1.1rem; color:#0f172a;">🏫 ${c.className}</strong>
                            <br><span style="font-size:0.8rem; color:#64748b;">Gegründet von Lehrer: ${c.creator}</span>
                        </div>
                        ${managementButtons}
                    `;
                    container.appendChild(div);
                });
            }
        }

        async function createClass() {
            const name = document.getElementById("new-class-name").value.trim();
            if(!name) return alert("Bitte einen Klassennamen eingeben!");
            
            const res = await fetch(API_URL, { method:"POST", body: JSON.stringify({ action:"createClassByTeacher", className: name, teacherName: currentUser.username }) });
            const data = await res.json();
            if(data.success) {
                alert("Klasse erfolgreich im Schulnetzwerk registriert!");
                document.getElementById("new-class-name").value = "";
                loadClassesFromServer();
            } else { alert(data.message); }
        }

        async function renameClassPrompt(oldName) {
            const newName = prompt(`Gib den neuen Namen für die Klasse "${oldName}" ein:`);
            if(!newName || newName.trim() === "" || newName.trim() === oldName) return;

            const res = await fetch(API_URL, { method:"POST", body: JSON.stringify({ 
                action: "renameClass", 
                oldClassName: oldName, 
                newClassName: newName.trim(), 
                username: currentUser.username 
            }) });
            const data = await res.json();
            
            if(data.success) {
                alert("Klasse erfolgreich umbenannt! Alle Schüler-Zugehörigkeiten wurden angepasst.");
                closeDetails();
                loadClassesFromServer();
            } else { alert("Fehler: " + data.message); }
        }

        function openClassDetails(index) {
            selectedClassObj = allAvailableClasses[index];
            document.getElementById("class-detail-card").style.display = "block";
            document.getElementById("detail-class-name").innerText = "🏫 " + selectedClassObj.className;
            document.getElementById("detail-class-owner").innerText = "Leitung: " + selectedClassObj.creator;

            renderPinnedContent();

            let isOwner = (selectedClassObj.creator === currentUser.username || currentUser.role === "admin");
            if(isOwner) {
                document.getElementById("teacher-pin-form").style.display = "block";
                document.getElementById("teacher-student-management").style.display = "block";
                document.getElementById("student-status-view").style.display = "none";
                loadClassMembers();
            } else {
                document.getElementById("teacher-pin-form").style.display = "none";
                document.getElementById("teacher-student-management").style.display = "none";
                document.getElementById("student-status-view").style.display = "block";
                updateStudentStatus();
            }
        }

        function renderPinnedContent() {
            const list = document.getElementById("pinned-content-list");
            list.innerHTML = "";
            let pins = selectedClassObj.pinned || [];
            
            if(pins.length === 0) {
                list.innerHTML = "<p style='color:#94a3b8; font-style:italic;'>Keine angepinnten Nachrichten vorhanden.</p>";
                return;
            }

            let isOwner = (selectedClassObj.creator === currentUser.username || currentUser.role === "admin");

            pins.forEach((pin, pIdx) => {
                let pDiv = document.createElement("div");
                pDiv.style.background = "#0f172a";
                pDiv.style.padding = "8px 12px";
                pDiv.style.borderRadius = "6px";
                pDiv.style.display = "flex";
                pDiv.style.justifyContent = "space-between";
                pDiv.style.alignItems = "center";
                pDiv.style.borderLeft = "4px solid #3b82f6";
                
                let deleteBtn = isOwner ? `<button style="background:none; border:none; color:#ef4444; cursor:pointer; font-weight:bold;" onclick="removePin(${pIdx})">❌</button>` : "";
                
                pDiv.innerHTML = `<span>${pin}</span>${deleteBtn}`;
                list.appendChild(pDiv);
            });
        }

        async function addPinToCurrentClass() {
            const textInput = document.getElementById("new-pin-text");
            const text = textInput.value.trim();
            if(!text) return;

            if(!selectedClassObj.pinned) selectedClassObj.pinned = [];
            selectedClassObj.pinned.push(text);

            const res = await fetch(API_URL, { method: "POST", body: JSON.stringify({ 
                action: "updateClassPins", 
                className: selectedClassObj.className, 
                pinnedArray: selectedClassObj.pinned 
            }) });
            const data = await res.json();
            if(data.success) {
                textInput.value = "";
                renderPinnedContent();
            }
        }

        async function removePin(pIdx) {
            selectedClassObj.pinned.splice(pIdx, 1);
            const res = await fetch(API_URL, { method: "POST", body: JSON.stringify({ 
                action: "updateClassPins", 
                className: selectedClassObj.className, 
                pinnedArray: selectedClassObj.pinned 
            }) });
            const data = await res.json();
            if(data.success) { renderPinnedContent(); }
        }

        async function loadClassMembers() {
            const list = document.getElementById("class-members-list");
            list.innerHTML = "Lade Schülerliste...";
            
            const res = await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "getLeaderboard", groupId: selectedClassObj.className }) });
            const data = await res.json();
            
            if(data.success) {
                list.innerHTML = "";
                if(data.leaderboard.length === 0) {
                    list.innerHTML = "<p style='color:#94a3b8; font-style:italic;'>Noch keine Schüler in dieser Klasse.</p>";
                    return;
                }
                data.leaderboard.forEach(s => {
                    list.innerHTML += `
                        <div class="project-item" style="background:#1e293b; border-color:#334155; padding:8px 12px;">
                            <span style="color:#fff;">👤 ${s.username}</span>
                            <button class="btn-danger-sm" style="padding:2px 8px; font-size:0.8rem;" onclick="kickStudent('${s.username}')">Entfernen</button>
                        </div>`;
                });
            }
        }

        async function addStudentToClass() {
            const name = document.getElementById("student-search-input").value.trim();
            if(!name) return;
            const res = await fetch(API_URL, { method:"POST", body: JSON.stringify({ action: "updateStudentGroup", username: name, className: selectedClassObj.className, operation: "add" }) });
            const data = await res.json();
            if(data.success) {
                document.getElementById("student-search-input").value = "";
                loadClassMembers();
            } else { alert("Schüler konnte nicht gefunden werden."); }
        }

        async function kickStudent(name) {
            if(!confirm(`${name} aus der Klasse entfernen?`)) return;
            const res = await fetch(API_URL, { method:"POST", body: JSON.stringify({ action: "updateStudentGroup", username: name, className: selectedClassObj.className, operation: "kick" }) });
            if((await res.json()).success) { loadClassMembers(); }
        }

        function updateStudentStatus() {
            const btn = document.getElementById("join-leave-class-btn");
            const txt = document.getElementById("student-membership-text");
            
            let userGroups = currentUser.groupId ? currentUser.groupId.split(",").map(g => g.trim()) : [];
            let isMember = userGroups.includes(selectedClassObj.className);

            if(isMember) {
                txt.innerText = "✅ Du bist Mitglied dieser Klasse.";
                btn.innerText = "🚪 Klasse verlassen";
                btn.style.background = "#ef4444";
                btn.onclick = () => toggleClassMembership("kick");
            } else {
                txt.innerText = "❌ Du bist kein Mitglied dieser Klasse.";
                btn.innerText = "📥 Klasse beitreten";
                btn.style.background = "#10b981";
                btn.onclick = () => toggleClassMembership("add");
            }
        }

        async function toggleClassMembership(op) {
            const res = await fetch(API_URL, { method:"POST", body: JSON.stringify({ action: "updateStudentGroup", username: currentUser.username, className: selectedClassObj.className, operation: op }) });
            if((await res.json()).success) {
                let userGroups = currentUser.groupId ? currentUser.groupId.split(",").map(g => g.trim()) : [];
                if(op === "add") {
                    userGroups.push(selectedClassObj.className);
                } else {
                    userGroups = userGroups.filter(g => g !== selectedClassObj.className);
                }
                currentUser.groupId = userGroups.length === 0 ? "keine" : userGroups.join(",");
                sessionStorage.setItem("currentUser", JSON.stringify(currentUser));
                updateStudentStatus();
            }
        }

        async function deleteClassFromServer(className) {
            if(!confirm(`Möchtest du die Klasse "${className}" wirklich löschen? Alle Schülerverbindungen werden gelöst.`)) return;
            const res = await fetch(API_URL, { method:"POST", body: JSON.stringify({ action: "deleteClass", className: className, username: currentUser.username }) });
            if((await res.json()).success) { closeDetails(); loadClassesFromServer(); }
        }

        function closeDetails() { document.getElementById("class-detail-card").style.display = "none"; }
        document.getElementById("logout-btn").addEventListener("click", () => { sessionStorage.clear(); window.location.href="login.html"; });
    </script>
</body>
</html>
